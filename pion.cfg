# ============================================================
#  pion.cfg  —  parameters for main.cc (deuteron + pion)
# ============================================================

# --- Physics summary ---
#
#  W = (tau.pi)(sigma . r_{pi-emitter}) * (S/b) * exp(-Omega r^2)
#
#  KEY SCALE DIFFERENCE vs sigma model:
#    W_sigma ~ S_sigma * M            (scalar, no position factor)
#    W_pion  ~ (S/b) * u * M         (P-wave, extra factor u ~ 0.1-0.4 fm)
#
#  For sigma: S_sigma = 20.35 MeV gives -2.2 MeV binding.
#  For pion:  need (S/b)*u ~ 20 MeV → S ~ 100-400 MeV  (b=1-2 fm, u~0.2 fm)
#
#  This is physically correct: pion coupling g²/4π ≈ 14 >> sigma coupling.
#  Large S compensates the P-wave position suppression factor u.
#
#  Vertex coords per sector:
#    Sector 1 |np pi0>: W = (sigma . x0)               [x1 cancels by symmetry]
#    Sector 2 |nn pi+>: W = (sigma . (x1 + 0.5*x0))   [single emitter: proton]
#    Sector 3 |pp pi->: W = (sigma . (x1 + 0.5*x0))   [single emitter: neutron]
#
# --- Physics parameters ---
S        = 18.0
b        = 1.1
rel      = 0

# --- Basis sizes ---
n_pn       = 10
n_pnπ      = 10

# --- SVM ---
n_cand   = 20
n_refine = 1

# --- Gaussian widths ---
mean_r   = 2.0    # typical NN distance (fm)
mean_R   = 1.5    # pion peak displacement (fm); ~ b_pion

# --- Parameter search ---
target   = -2.225
n_opt_S  = 10
n_opt_b  = 0
k_S   = -0.5
k_b   = -0.05