# ============================================================
#  pion.cfg  —  parameters for main.cc (deuteron + pion)
# ============================================================

# --- Physics ---
#
#  The pion vertex is  W = (tau.pi)(sigma.r_pi) * F(r)
#  with  F(r) = A * exp(-Omega r^2),  A = S_w / b_w  (Fedorov eq. 38).
#
#  Key: r_pi carries units of fm, so the matrix element
#         <g_bare | r_pi * exp(-Omega r^2) | g_clothed>  ~  fm^7
#  while the overlap N ~ fm^6.  Energy = W/N ~ fm, NOT MeV.
#  The division by b_w in A = S_w/b_w fixes the units so that
#  the effective coupling has units MeV/fm * fm = MeV.  DONE IN CODE.
#
#  So in THIS config:
#    S  [MeV]  is the "strength parameter" S_w as Fedorov defines it.
#    b  [fm]   is the form-factor range b_w.
#    The code internally uses A = S/b  [MeV/fm]  in the vertex.
#
#  Starting-point estimate:
#    For comparison, the sigma model uses S_sigma=20.35 MeV, b_sigma=3 fm.
#    The effective pion coupling density A=S/b.  With b_pion < b_sigma,
#    the pion vertex is shorter-range (expected for heavier pion exchange).
#    A reasonable first try matching photoproduction scales:
#      S ~ 20 MeV, b ~ 1.5 fm  -->  A = 13.3 MeV/fm
#
S        = 15.0    # coupling strength S_w (MeV)
b        = 2.0     # vertex range b_w (fm); code uses A = S/b internally
rel      = 0       # 0 = classical KE, 1 = relativistic

# --- Basis sizes ---
n0       = 10      # bare |pn> sector
n1       = 20      # |pn pi0> sector
n2       = 20      # |nn pi+> sector
n3       = 20      # |pp pi-> sector

# --- SVM ---
n_cand   = 10
n_refine = 2

# --- Gaussian width range (fm^-2) ---
A_min    = 0.01   # r ~ 32 fm (long-range tail)
A_max    = 5.0    # r ~ 0.32 fm (hard core)

# --- Parameter search ---
target   = -2.225  # MeV
n_opt_S  = 2
n_opt_b  = 5
k_S      = 0.5     # MeV per MeV of error  (larger steps OK now units are fixed)
k_b      = 0.05    # fm  per MeV of error