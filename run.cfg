# run.cfg  —  parameters for the deuteron pion-coupling SVM run
# Edit this file freely and re-run with:
#   ./deuteron --config run.cfg
# Command-line flags override these values, e.g.:
#   ./deuteron --config run.cfg --K_max 40 --seed 123

# ── Physics ──────────────────────────────────────────────────────────────────
S            = 20.0    # MeV  coupling strength
b            = 1.0     # fm   form-factor range

# ── SVM ──────────────────────────────────────────────────────────────────────
K_max        = 25      # basis size (more = more accurate, slower)
N_trial      = 50      # candidates per SVM step
refine_every = 5      # refine basis every N steps  (0 = off)
N_refine     = 30      # candidates per refinement step
b0           = 1.4     # fm   Gaussian length scale (~nuclear radius)
s_max        = 0.1     # fm⁻¹ shift bound  (0 = unshifted, spherically symmetric)
seed         = 42      # RNG seed (change for statistical ensemble)


# 1. Output settings
set terminal pngcairo size 800,600 enhanced font 'Verdana,10'
set output 'fastscan.png'

# 2. Axis Setup
set title "Deuteron Binding Energy E_0(S, b)"
set xlabel "Coupling Strength S [MeV]"
set ylabel "Range b [fm]"
set xrange [10:40]
set yrange [0.8:2.0]

set palette defined ( 0 "blue", 1 "white", 2 "red" )

lower_lim = -4.5
target = -2.2
upper_lim = (2 * target) - lower_lim  # This results in -4.4 - (-4.5) = 0.1
set cbrange [lower_lim : upper_lim]

# 5. Contours (Crucial for a Bachelor Thesis)
# This draws a black line specifically at the experimental value
set contour base
set cntrparam levels discrete -2.224  # Precise experimental value
unset key                             # Removes the legend for a cleaner look
set clabel "Exp: -2.22 MeV"

# 6. View and Rendering
set view map                          # Top-down heatmap view
set pm3d interpolate 10,10            # Smoothen the grid for a professional look
set ticscale 0                        # Cleaner axes

# 7. Plotting
# Assuming columns are: S  b  E0
splot 'fastscan.dat' using 1:2:3 with pm3d