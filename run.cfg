# run.cfg  —  parameters for the deuteron pion-coupling SVM run
# Edit this file freely and re-run with:
#   ./deuteron --config run.cfg
# Command-line flags override these values, e.g.:
#   ./deuteron --config run.cfg --K_max 40 --seed 123

# ── Physics ──────────────────────────────────────────────────────────────────
S            = 20.0    # MeV  coupling strength
b            = 1.0     # fm   form-factor range

# ── SVM ──────────────────────────────────────────────────────────────────────
K_max        = 25      # basis size (more = more accurate, slower)
N_trial      = 50      # candidates per SVM step
refine_every = 5      # refine basis every N steps  (0 = off)
N_refine     = 30      # candidates per refinement step
b0           = 1.4     # fm   Gaussian length scale (~nuclear radius)
s_max        = 0.1     # fm⁻¹ shift bound  (0 = unshifted, spherically symmetric)
seed         = 42      # RNG seed (change for statistical ensemble)
