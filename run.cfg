# ====================================================================
# Deuteron 9-Channel SVM Configuration File
# 
# Usage: ./main (automatically reads this file if present)
# Override via command line: ./main --S 25.0 --K_max 40
# ====================================================================

# ── Physics Parameters ──────────────────────────────────────────────
S       = 18.0    # Pion-nucleon coupling strength [MeV]
b       = 1.4     # Form-factor range [fm]

# ── SVM Parameters ──────────────────────────────────────────────────
K_max   = 15      # Maximum basis size (number of Gaussians)
N_trial = 30      # Number of random candidates tested per SVM step
b0      = 1.4     # Gaussian length scale [fm] (Typically matches b)
s_max   = 0.1     # Shift vector bound [fm^-1] (Set to 0.0 for unshifted)
seed    = 0      # Random number generator seed for reproducibility 0 for random